<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Drone Show · Check-In</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --black:   #0b0c0f;
  --dark:    #13151a;
  --card:    #1c1f27;
  --border:  #2a2f3d;
  --border2: #363c4e;
  --text:    #eef0f6;
  --muted:   #6b7280;
  --dim:     #9ca3af;
  --green:   #22c55e;
  --green-bg:rgba(34,197,94,.12);
  --cyan:    #06b6d4;
  --cyan-bg: rgba(6,182,212,.1);
  --amber:   #f59e0b;
  --amber-bg:rgba(245,158,11,.12);
  --red:     #ef4444;
  --red-bg:  rgba(239,68,68,.1);
  --purple:  #a855f7;
  --purple-bg:rgba(168,85,247,.1);
}

body {
  font-family: 'Sarabun', sans-serif;
  background: var(--black);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 120px;
  overflow-x: hidden;
}

/* ── LOADER ── */
.loader {
  position: fixed; inset: 0; z-index: 999;
  background: var(--black);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.loader-ring {
  width: 48px; height: 48px;
  border: 3px solid var(--border2);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
.loader-text { font-size: 13px; color: var(--muted); letter-spacing: .05em; }

/* ── TOP BAR ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(11,12,15,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
}
.topbar-drone { font-size: 22px; }
.topbar-title { font-size: 15px; font-weight: 700; letter-spacing: .02em; }
.topbar-sub { font-size: 11px; color: var(--muted); margin-top: 1px; font-family: 'Space Mono', monospace; }
.topbar-status {
  margin-left: auto;
  font-size: 10px; font-family: 'Space Mono', monospace;
  color: var(--green); letter-spacing: .08em;
  display: flex; align-items: center; gap: 5px;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: blink 2s ease infinite;
}

/* ── USER STRIP ── */
.user-strip {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  animation: slideDown .4s ease both;
}
.user-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid var(--border2);
  object-fit: cover; flex-shrink: 0;
}
.user-avatar-placeholder {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--card); border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.user-name { font-size: 15px; font-weight: 600; }
.user-role { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── VIEW-ONLY BANNER ── */
.viewonly-banner {
  margin: 12px 16px 0;
  background: var(--amber-bg);
  border: 1px solid rgba(245,158,11,.3);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex; gap: 10px; align-items: flex-start;
  animation: slideDown .4s .1s ease both;
}
.viewonly-banner .vi { font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
.viewonly-banner .vt { font-size: 13px; font-weight: 600; color: var(--amber); margin-bottom: 3px; }
.viewonly-banner .vd { font-size: 11px; color: var(--dim); line-height: 1.5; margin-bottom: 10px; }
.copy-id-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Sarabun', sans-serif;
  font-size: 12px; font-weight: 600;
  color: var(--cyan);
  background: var(--cyan-bg);
  border: 1px solid rgba(6,182,212,.3);
  border-radius: 6px;
  padding: 7px 12px;
  cursor: pointer; transition: all .15s;
}
.copy-id-btn:active { transform: scale(.97); }

/* ── SECTION ── */
.section-head {
  padding: 20px 18px 10px;
  display: flex; align-items: baseline; gap: 8px;
}
.section-head .sh-label {
  font-size: 11px; font-weight: 700;
  color: var(--muted); letter-spacing: .12em; text-transform: uppercase;
}
.section-head .sh-count {
  font-size: 11px; font-family: 'Space Mono', monospace;
  color: var(--border2);
}

/* ── JOB CARDS ── */
.job-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

.job-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
  animation: fadeUp .4s ease both;
}

.job-card.active-today {
  cursor: pointer;
}

.job-card.active-today:active {
  transform: scale(.99);
}

.job-card.selected {
  border-color: var(--cyan);
  box-shadow: 0 0 0 1px var(--cyan), 0 4px 24px rgba(6,182,212,.15);
}

.job-card.inactive {
  opacity: .5;
  filter: grayscale(.5);
  cursor: default;
}

/* Status bar ด้านบนการ์ด */
.card-status-bar {
  height: 3px;
  background: var(--border);
}
.job-card.active-today .card-status-bar { background: var(--green); }
.job-card.selected .card-status-bar { background: var(--cyan); }
.job-card.inactive .card-status-bar { background: var(--border); }
.job-card.viewonly .card-status-bar { background: var(--amber); }

.card-body { padding: 14px 16px 12px; }

.card-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 10px;
  margin-bottom: 10px;
}
.card-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 5px;
  margin-bottom: 8px;
}
.badge-today    { background: var(--green-bg);  color: var(--green);  border: 1px solid rgba(34,197,94,.25); }
.badge-upcoming { background: var(--border);    color: var(--muted);  border: 1px solid var(--border2); }
.badge-viewonly { background: var(--amber-bg);  color: var(--amber);  border: 1px solid rgba(245,158,11,.25); }

.card-name { font-size: 16px; font-weight: 700; line-height: 1.3; flex: 1; min-width: 0; }

.card-rate {
  font-family: 'Space Mono', monospace;
  font-size: 20px; font-weight: 700;
  color: var(--green);
  white-space: nowrap; flex-shrink: 0;
}
.job-card.inactive .card-rate { color: var(--muted); }
.job-card.viewonly .card-rate { color: var(--muted); }

.card-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.tag {
  font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 5px;
  display: inline-flex; align-items: center; gap: 4px;
}
.tag-date    { background: var(--card);   color: var(--dim);    border: 1px solid var(--border2); }
.tag-bkk     { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(168,85,247,.25); }
.tag-upc     { background: var(--amber-bg);  color: var(--amber);  border: 1px solid rgba(245,158,11,.25); }
.tag-show    { background: var(--green-bg);  color: var(--green);  border: 1px solid rgba(34,197,94,.25); }
.tag-travel  { background: var(--border);    color: var(--muted);  border: 1px solid var(--border2); }
.tag-drone   { background: var(--cyan-bg);   color: var(--cyan);   border: 1px solid rgba(6,182,212,.25); }

/* ── EMPTY STATE ── */
.empty {
  margin: 0 16px;
  padding: 48px 24px;
  background: var(--card);
  border: 1px dashed var(--border2);
  border-radius: 14px;
  text-align: center;
}
.empty .ei { font-size: 40px; margin-bottom: 12px; }
.empty .et { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty .ed { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* ── BOTTOM CHECKIN BAR ── */
.checkin-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: rgba(11,12,15,.95);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
}
.checkin-btn {
  width: 100%; padding: 17px;
  border-radius: 12px; border: none;
  font-family: 'Sarabun', sans-serif;
  font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.checkin-btn.ready {
  background: var(--green);
  color: #000;
  box-shadow: 0 4px 20px rgba(34,197,94,.35);
}
.checkin-btn.ready:active { transform: scale(.98); }
.checkin-btn.idle {
  background: var(--card);
  color: var(--muted);
  border: 1.5px solid var(--border2);
  cursor: not-allowed;
}
.checkin-btn.locked {
  background: var(--card);
  color: var(--muted);
  border: 1.5px solid var(--border2);
  cursor: not-allowed;
}
.checkin-btn.loading {
  background: var(--green);
  color: #000; opacity: .7;
  cursor: not-allowed;
}
.spin-icon {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,.3);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(10px);
  display: none; align-items: flex-end; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; animation: fadeIn .2s; }

.modal-sheet {
  background: var(--dark);
  border: 1px solid var(--border2);
  border-radius: 20px;
  width: 100%; max-width: 400px;
  overflow: hidden;
  animation: slideUp .3s cubic-bezier(.34,1.56,.64,1);
}

.modal-top {
  padding: 20px 20px 16px;
  display: flex; align-items: center; gap: 14px;
}
.modal-icon-wrap {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.modal-icon-wrap.success { background: var(--green-bg); border: 1.5px solid rgba(34,197,94,.3); }
.modal-icon-wrap.error   { background: var(--red-bg);   border: 1.5px solid rgba(239,68,68,.3); }

.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
.modal-sub   { font-size: 13px; color: var(--dim); line-height: 1.5; }

/* กล่องเงิน */
.money-box {
  margin: 0 20px 16px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.money-label { font-size: 13px; color: var(--dim); }
.money-value {
  font-family: 'Space Mono', monospace;
  font-size: 28px; font-weight: 700;
  color: var(--green);
}
.money-unit { font-size: 14px; font-weight: 400; color: var(--dim); margin-left: 4px; }

.modal-action {
  padding: 0 20px 20px;
}
.modal-btn {
  width: 100%; padding: 14px;
  border-radius: 10px; border: none;
  font-family: 'Sarabun', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer;
}
.modal-btn.success-btn { background: var(--green); color: #000; }
.modal-btn.error-btn   { background: var(--card); color: var(--text); border: 1px solid var(--border2); }

/* ── ANIMATIONS ── */
@keyframes spin      { to { transform: rotate(360deg); } }
@keyframes blink     { 0%,100% { opacity:1; } 50% { opacity:.4; } }
@keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
@keyframes slideDown { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
@keyframes slideUp   { from { opacity:0; transform: translateY(20px) scale(.96); } to { opacity:1; transform: translateY(0) scale(1); } }
@keyframes fadeUp    { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">CONNECTING TO LINE</div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-drone">🚁</div>
  <div>
    <div class="topbar-title">Drone Show</div>
    <div class="topbar-sub">FIELD CHECK-IN</div>
  </div>
  <div class="topbar-status">
    <div class="dot"></div>
    <span id="topStatus">LIVE</span>
  </div>
</div>

<!-- USER STRIP -->
<div class="user-strip" id="userStrip" style="display:none">
  <div class="user-avatar-placeholder" id="userAvatarWrap">👤</div>
  <div>
    <div class="user-name" id="userName">-</div>
    <div class="user-role" id="userRole">-</div>
  </div>
</div>

<!-- VIEW-ONLY BANNER (unauthorized) -->
<div class="viewonly-banner" id="viewonlyBanner" style="display:none">
  <div class="vi">👀</div>
  <div>
    <div class="vt">โหมดดูอย่างเดียว</div>
    <div class="vd">คุณยังไม่อยู่ในรายชื่อพนักงาน<br>กดปุ่มด้านล่างเพื่อขอเพิ่มในระบบ</div>
    <button class="copy-id-btn" id="copyIdBtn">📋 คัดลอก LINE ID</button>
  </div>
</div>

<!-- JOB LIST -->
<div class="section-head">
  <span class="sh-label">รายการงาน</span>
  <span class="sh-count" id="jobCount"></span>
</div>
<div class="job-list" id="jobList"></div>

<!-- CHECKIN BAR -->
<div class="checkin-bar">
  <button class="checkin-btn idle" id="checkinBtn" disabled>
    เลือกงานก่อนเช็คอิน
  </button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-top">
      <div class="modal-icon-wrap" id="modalIconWrap">✅</div>
      <div>
        <div class="modal-title" id="modalTitle">เช็คอินสำเร็จ</div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
    </div>
    <div class="money-box" id="moneyBox" style="display:none">
      <div class="money-label">💰 ค่าออกงานวันนี้</div>
      <div>
        <span class="money-value" id="moneyVal">0</span>
        <span class="money-unit">บาท</span>
      </div>
    </div>
    <div class="modal-action">
      <button class="modal-btn" id="modalBtn" onclick="closeModal()">ตกลง</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════
//  CONFIG — แก้ 2 ค่านี้
// ════════════════════════════════════
const LIFF_ID = '2009970912-iaF1MOmb';
const API_URL = 'https://script.google.com/macros/s/AKfycbwN5zG9_riBfChBmN4K-ROu8GaCYBf6RgPAFSWkDFA4VER89QJi4xPrr-EHb-IinA9R/exec';

// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
let user = null;
let authorized = false;
let selectedJobId = null;
let isSubmitting = false;

// ════════════════════════════════════
//  INIT
// ════════════════════════════════════
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    user = profile;
    renderUser(profile);

    const data = await apiFetch(`?action=init&userId=${enc(profile.userId)}`);
    authorized = !!data.authorized;

    if (!authorized) showViewonlyBanner();

    renderJobs(data.jobsToday || []);
    hide('loader');
  } catch (err) {
    showFatalError(err.message);
  }
}

// ════════════════════════════════════
//  RENDER USER
// ════════════════════════════════════
function renderUser(profile) {
  const wrap = id('userAvatarWrap');
  if (profile.pictureUrl) {
    wrap.outerHTML = `<img class="user-avatar" id="userAvatarWrap" src="${esc(profile.pictureUrl)}" alt=""/>`;
  }
  id('userName').textContent = profile.displayName || '-';
  id('userRole').textContent = authorized ? 'พนักงาน' : 'ผู้เยี่ยมชม';
  show('userStrip');
}

// ════════════════════════════════════
//  VIEW-ONLY BANNER
// ════════════════════════════════════
function showViewonlyBanner() {
  show('viewonlyBanner');
  const btn = id('copyIdBtn');
  if (btn) {
    btn.addEventListener('click', function() {
      const me = this;
      const orig = me.textContent;
      copyText(user ? user.userId : '', () => {
        me.textContent = '✅ คัดลอกแล้ว!';
        setTimeout(() => { me.textContent = orig; }, 2500);
      });
    });
  }
  // ปุ่มเช็คอิน → locked
  const btn2 = id('checkinBtn');
  btn2.className = 'checkin-btn locked';
  btn2.disabled = true;
  btn2.textContent = 'เช็คอินไม่ได้';
}

// ════════════════════════════════════
//  RENDER JOBS
// ════════════════════════════════════
function renderJobs(jobs) {
  const list = id('jobList');
  const countEl = id('jobCount');

  if (!jobs.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="ei">🌙</div>
        <div class="et">ไม่มีงานในช่วงนี้</div>
        <div class="ed">งานจะแสดงเมื่อผู้ดูแล<br>เพิ่มข้อมูลในระบบ</div>
      </div>`;
    countEl.textContent = '';
    return;
  }

  // จัดเรียง: วันนี้ขึ้นก่อน
  jobs.sort((a, b) => {
    if (a.isToday && !b.isToday) return -1;
    if (!a.isToday && b.isToday) return 1;
    return a.date.localeCompare(b.date);
  });

  const todayCount = jobs.filter(j => j.isToday).length;
  countEl.textContent = `${jobs.length} งาน · วันนี้ ${todayCount}`;

  list.innerHTML = jobs.map((j, i) => {
    const canClick = j.isToday && authorized;
    const isViewonly = !authorized;

    let badgeClass, badgeText;
    if (isViewonly) {
      badgeClass = 'badge-viewonly'; badgeText = '👀 ดูอย่างเดียว';
    } else if (j.isToday) {
      badgeClass = 'badge-today'; badgeText = '⚡ พร้อมเช็คอิน';
    } else {
      badgeClass = 'badge-upcoming'; badgeText = '⏳ ' + formatDate(j.date);
    }

    const cardClass = isViewonly ? 'job-card viewonly'
                    : j.isToday ? 'job-card active-today'
                    : 'job-card inactive';

    const areaTag = j.area === 'BKK'
      ? `<span class="tag tag-bkk">🏙️ กทม</span>`
      : `<span class="tag tag-upc">🌏 ต่างจังหวัด</span>`;

    const dayTag = j.dayType === 'SHOW'
      ? `<span class="tag tag-show">✈️ ซ้อม/บินจริง</span>`
      : `<span class="tag tag-travel">🚗 เดินทาง/Standby</span>`;

    return `
    <div class="${cardClass}" data-id="${esc(j.id)}"
         style="animation-delay:${i * 60}ms"
         ${canClick ? `onclick="selectJob('${esc(j.id)}')"` : ''}>
      <div class="card-status-bar"></div>
      <div class="card-body">
        <div class="card-badge ${badgeClass}">${badgeText}</div>
        <div class="card-top">
          <div class="card-name">${esc(j.name)}</div>
          <div class="card-rate">฿${(j.rate||0).toLocaleString()}</div>
        </div>
        <div class="card-tags">
          <span class="tag tag-date">📅 ${formatDate(j.date)}</span>
          ${areaTag}
          ${dayTag}
          <span class="tag tag-drone">🚁 ${j.droneCount} ตัว</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // auto-select ถ้ามีงานวันนี้แค่ 1 งาน
  const todayJobs = jobs.filter(j => j.isToday);
  if (authorized && todayJobs.length === 1) selectJob(todayJobs[0].id);
}

// ════════════════════════════════════
//  SELECT JOB
// ════════════════════════════════════
function selectJob(jobId) {
  if (!authorized) return;
  selectedJobId = jobId;

  document.querySelectorAll('.job-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === jobId);
  });

  const btn = id('checkinBtn');
  btn.className = 'checkin-btn ready';
  btn.disabled = false;
  btn.innerHTML = '📍 เช็คอินตอนนี้';
}

// ════════════════════════════════════
//  CHECK-IN FLOW
// ════════════════════════════════════
async function doCheckIn() {
  if (!selectedJobId || isSubmitting || !authorized) return;
  isSubmitting = true;

  const btn = id('checkinBtn');
  btn.className = 'checkin-btn loading';
  btn.disabled = true;
  btn.innerHTML = '<div class="spin-icon"></div>ขอตำแหน่ง GPS...';

  let coords;
  try {
    coords = await getGPS();
  } catch (err) {
    isSubmitting = false;
    resetBtn();
    showModal('error', '📡 ไม่สามารถระบุตำแหน่งได้', err.message + '\n\nโปรดอนุญาตการเข้าถึงตำแหน่งใน LINE');
    return;
  }

  btn.innerHTML = '<div class="spin-icon"></div>กำลังบันทึก...';

  try {
    const data = await apiPost({
      userId: user.userId,
      displayName: user.displayName,
      jobId: selectedJobId,
      lat: coords.lat,
      lng: coords.lng,
    });

    isSubmitting = false;
    resetBtn();

    if (data.ok) {
      showModal('success',
        '✅ เช็คอินสำเร็จ',
        `${esc(data.jobName)} · ${data.time} · ระยะ ${data.distance} ม.`,
        data.amount
      );
    } else {
      showModal('error', '❌ เช็คอินไม่สำเร็จ', data.error || 'เกิดข้อผิดพลาด');
    }
  } catch (err) {
    isSubmitting = false;
    resetBtn();
    showModal('error', '❌ เกิดข้อผิดพลาด', err.message);
  }
}

// ════════════════════════════════════
//  GPS
// ════════════════════════════════════
function getGPS() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('Browser ไม่รองรับ GPS'));
    navigator.geolocation.getCurrentPosition(
      p => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
      e => {
        const msg = ['', 'ปฏิเสธการเข้าถึงตำแหน่ง', 'ระบุตำแหน่งไม่ได้', 'หมดเวลา GPS'][e.code] || 'GPS Error';
        reject(new Error(msg));
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
}

// ════════════════════════════════════
//  MODAL
// ════════════════════════════════════
function showModal(type, title, sub, amount) {
  const wrap = id('modalIconWrap');
  const moneyBox = id('moneyBox');
  const btn = id('modalBtn');

  wrap.className = `modal-icon-wrap ${type}`;
  wrap.textContent = type === 'success' ? '✅' : '⚠️';
  id('modalTitle').textContent = title;
  id('modalSub').textContent = sub || '';

  if (type === 'success' && amount != null) {
    id('moneyVal').textContent = Number(amount).toLocaleString();
    moneyBox.style.display = 'flex';
  } else {
    moneyBox.style.display = 'none';
  }

  btn.className = `modal-btn ${type === 'success' ? 'success-btn' : 'error-btn'}`;
  id('modalOverlay').className = 'modal-overlay open';
}

function closeModal() {
  id('modalOverlay').className = 'modal-overlay';
}

// ════════════════════════════════════
//  HELPERS
// ════════════════════════════════════
function resetBtn() {
  const btn = id('checkinBtn');
  if (!authorized) return;
  if (selectedJobId) {
    btn.className = 'checkin-btn ready';
    btn.disabled = false;
    btn.innerHTML = '📍 เช็คอินตอนนี้';
  } else {
    btn.className = 'checkin-btn idle';
    btn.disabled = true;
    btn.textContent = 'เลือกงานก่อนเช็คอิน';
  }
}

function formatDate(dateStr) {
  try {
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    const now = new Date(); now.setHours(0,0,0,0);
    const diff = Math.floor((dt - now) / 86400000);
    if (diff === 0) return 'วันนี้';
    if (diff === 1) return 'พรุ่งนี้';
    const days = ['อา','จ','อ','พ','พฤ','ศ','ส'];
    return `${d}/${m} (${days[dt.getDay()]})`;
  } catch { return dateStr; }
}

function copyText(text, cb) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(cb).catch(() => { copyFallback(text); cb(); });
  } else { copyFallback(text); cb(); }
}

function copyFallback(text) {
  const el = Object.assign(document.createElement('textarea'), {
    value: text, style: 'position:fixed;opacity:0'
  });
  document.body.appendChild(el);
  el.select();
  try { document.execCommand('copy'); } catch {}
  document.body.removeChild(el);
}

async function apiFetch(qs) {
  const res = await fetch(API_URL + qs);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'API error');
  return data;
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
  });
  return res.json();
}

function showFatalError(msg) {
  const el = id('loader');
  el.innerHTML = `<div style="color:#ef4444;padding:24px;text-align:center;font-size:14px;line-height:1.7">
    <div style="font-size:32px;margin-bottom:12px">⚠️</div>
    <strong>เกิดข้อผิดพลาด</strong><br>${esc(msg)}
  </div>`;
}

const id  = s => document.getElementById(s);
const show = s => { const el = id(s); if (el) el.style.display = ''; };
const hide = s => { const el = id(s); if (el) el.style.display = 'none'; };
const enc  = s => encodeURIComponent(s);
const esc  = s => String(s).replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);

// ── bind checkin button
document.getElementById('checkinBtn').addEventListener('click', doCheckIn);

// ── start
init();
</script>
